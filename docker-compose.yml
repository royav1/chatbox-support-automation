services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      USE_REDIS: "1"
      REDIS_URL: redis://redis:6379/0
      SESSION_TTL_SECONDS: "7200"
      USAGE_DB_PATH: /app/data/usage_events.db
      TENANT_DB_PATH: /app/data/tenants.db
      USE_LLM: "1"
      LLM_PROVIDER: mock
      LLM_MIN_CONFIDENCE: "0.75"
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_TIMEOUT_SECONDS: "20"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000

volumes:
  backend_data:
